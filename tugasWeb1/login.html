<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SI-Kampus</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        body {
            /* Background gradasi agar senada dengan sidebar dashboard */
            background: linear-gradient(135deg, #0d6efd 0%, #0044aa 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            border: none;
            border-radius: 15px;
        }
        .btn-login {
            background-color: #0d6efd;
            border: none;
            padding: 12px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-login:hover {
            background-color: #0044aa;
            transform: translateY(-2px);
        }
        .brand-icon {
            font-size: 3rem;
            color: #0d6efd;
        }
    </style>
</head>
<body>

<div class="container p-3">
    <div class="card login-card shadow-lg mx-auto">
        <div class="card-body p-5">
            
            <div class="text-center mb-4">
                <div class="brand-icon mb-2">
                    <i class="bi bi-laptop"></i>
                </div>
                <h3 class="fw-bold text-secondary">SI-Kampus</h3>
                <p class="text-muted small">Silakan login untuk mengakses sistem</p>
            </div>

            <form>
                <div class="mb-3">
                    <label class="form-label small fw-bold text-secondary">EMAIL / USERNAME</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-person text-muted"></i></span>
                        <input type="text" class="form-control bg-light border-start-0" placeholder="Masukkan username">
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label small fw-bold text-secondary">PASSWORD</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock text-muted"></i></span>
                        <input type="password" class="form-control bg-light border-start-0" placeholder="Masukkan password">
                    </div>
                </div>

                <div class="d-grid">
                    <a href="index.html" class="btn btn-primary btn-login shadow-sm">
                        LOGIN SEKARANG
                    </a>
                </div>
            </form>

            <div class="text-center mt-4">
                <a href="#" class="text-decoration-none small text-muted">Lupa password?</a>
            </div>

        </div>
    </div>
    
    <p class="text-center text-white-50 mt-4 small">
        &copy; 2026 Sistem Informasi - Tugas Matkul PSI
    </p>
</div>

</body>
</html>
